<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Jenny Speelman</title>
  <meta name="description" content="The page you were looking for doesn't exist on Jenny Speelman's portfolio." />
  <meta name="robots" content="noindex" />

  <!-- Self-hosted fonts — see @font-face in assets/style.css. -->
  <link rel="preload" as="font" type="font/woff2" href="fonts/bricolage-grotesque-vf-latin.woff2" crossorigin />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d6b63" />

  <!-- Theme init: apply stored preference before CSS paints to avoid a flash. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        if (stored === 'light' || stored === 'dark') {
          document.documentElement.setAttribute('data-theme', stored);
        }
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var active = stored || (prefersDark ? 'dark' : 'light');
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', active === 'dark' ? '#0b2725' : '#0d6b63');
      } catch (_) {}
    })();
  </script>

  <!-- Privacy-friendly analytics by Plausible — cookieless, no banner required. -->
  <script async src="https://plausible.io/js/pa--HY2cpyqkKJuL5luJgoFc.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>

  <link rel="stylesheet" href="assets/style.css" />
  <style>
    /* Minimal centered layout for the 404 — reuses all tokens/components from style.css */
    .nf-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
      background: var(--bg);
    }
    .nf-inner {
      max-width: 36rem;
      text-align: center;
    }
    .nf-code {
      font-family: var(--font-serif);
      font-size: clamp(4.5rem, 14vw, 8rem);
      font-weight: 800;
      line-height: 1;
      color: var(--teal);
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .nf-title {
      font-family: var(--font-serif);
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .nf-body {
      font-family: var(--font-sans);
      font-size: 1.05rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .nf-ctas {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <a href="#main" class="skip-link">Skip to content</a>

  <main id="main" class="nf-page">
    <div class="nf-inner">
      <p class="nf-code" aria-hidden="true">404</p>
      <h1 class="nf-title">Page not found</h1>
      <p class="nf-body">
        The page you were looking for doesn't exist or may have moved.
        Let's get you back to something useful.
      </p>
      <div class="nf-ctas">
        <a href="/" class="btn btn-primary">Back to home</a>
        <a href="/#writing" class="btn btn-ghost">Browse writing</a>
      </div>
    </div>
  </main>

</body>
</html>
